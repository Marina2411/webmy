<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Техно Мир | Контакты</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
<div class="form-container">
    <h1>Свяжитесь с нами</h1>

    <div class="nav-links" style="display: flex; justify-content: center; gap: 30px; margin-bottom: 30px;">
        <a href="index.html">Главная</a>
        <a href="page2.html">Галерея</a>
        <a href="page3.html">Контакты</a>
    </div>

    <form id="contactForm">
        <div class="form-group">
            <label>Фамилия</label>
            <input type="text" name="surname" id="surname" required>
        </div>
        <div class="form-group">
            <label>Имя</label>
            <input type="text" name="name" id="name" required>
        </div>
        <div class="form-group">
            <label>Отчество</label>
            <input type="text" name="patronymic" id="patronymic">
        </div>

        <fieldset>
            <legend>Пол</legend>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Мужской"> Мужской</label>
                <label><input type="radio" name="gender" value="Женский"> Женский</label>
            </div>
        </fieldset>

        <div class="form-group">
            <label>Форма обучения</label>
            <select name="department" id="department">
                <option>Очное</option>
                <option>Заочное</option>
            </select>
        </div>

        <fieldset>
            <legend>Сданные зачёты</legend>
            <div class="checkbox-group">
                <label><input type="checkbox" name="zachet1" value="Математика"> Математика</label>
                <label><input type="checkbox" name="zachet2" value="Физика"> Физика</label>
                <label><input type="checkbox" name="zachet3" value="Программирование"> Программирование</label>
            </div>
        </fieldset>

        <div class="grade-select">
            <p><strong>Оценки по предметам</strong></p>
            <label>Математика: 
                <select name="math_grade" id="math_grade">
                    <option>2</option><option>3</option><option>4</option><option selected>5</option>
                </select>
            </label><br>
            <label>Физика: 
                <select name="physics_grade" id="physics_grade">
                    <option>2</option><option>3</option><option>4</option><option selected>5</option>
                </select>
            </label><br>
            <label>Программирование: 
                <select name="prog_grade" id="prog_grade">
                    <option>2</option><option>3</option><option>4</option><option selected>5</option>
                </select>
            </label>
        </div>

        <div class="form-group">
            <label>Ваш комментарий</label>
            <textarea name="comment" id="comment" rows="4" style="width: 100%; padding: 10px; border-radius: 8px; border: none; font-family: inherit;" placeholder="Напишите ваш отзыв или пожелание..."></textarea>
        </div>

        <button class="submit-btn" type="button" id="submitBtn">Отправить анкету</button>
        <button class="reset-btn" type="reset">Очистить</button>
    </form>

    <a class="back-link" href="index.html">← На главную</a>
</div>

<script>
    const submitBtn = document.getElementById('submitBtn');

    submitBtn.addEventListener('click', function(e) {
        // Собираем данные из формы
        const surname = document.getElementById('surname').value.trim();
        const name = document.getElementById('name').value.trim();
        
        // Проверка обязательных полей
        if (!surname || !name) {
            alert('Пожалуйста, заполните фамилию и имя');
            return;
        }
        
        // Моментальный переход на главную страницу
        window.location.replace('index.html');
    });
</script>
</body>
</html>
