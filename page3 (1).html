<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Техно Мир | Контакты</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
<div class="form-container">
    <h1>Свяжитесь с нами</h1>

    <div class="nav-links" style="display: flex; justify-content: center; gap: 30px; margin-bottom: 30px;">
        <a href="index.html">Главная</a>
        <a href="page2.html">Галерея</a>
        <a href="page3.html">Контактыыыыыыыыы</a>
    </div>

    <form id="contactForm">
        <div class="form-group">
            <label>Фамилия</label>
            <input type="text" name="surname" id="surname" required>
        </div>
        <div class="form-group">
            <label>Имя</label>
            <input type="text" name="name" id="name" required>
        </div>
        <div class="form-group">
            <label>Отчество</label>
            <input type="text" name="patronymic" id="patronymic">
        </div>

        <fieldset>
            <legend>Пол</legend>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Мужской"> Мужской</label>
                <label><input type="radio" name="gender" value="Женский"> Женский</label>
            </div>
        </fieldset>

        <div class="form-group">
            <label>Форма обучения</label>
            <select name="department" id="department">
                <option>Очное</option>
                <option>Заочное</option>
            </select>
        </div>

        <fieldset>
            <legend>Сданные зачёты</legend>
            <div class="checkbox-group">
                <label><input type="checkbox" name="zachet1" value="Математика"> Математика</label>
                <label><input type="checkbox" name="zachet2" value="Физика"> Физика</label>
                <label><input type="checkbox" name="zachet3" value="Программирование"> Программирование</label>
            </div>
        </fieldset>

        <div class="grade-select">
            <p><strong>Оценки по предметам</strong></p>
            <label>Математика: 
                <select name="math_grade" id="math_grade">
                    <option>2</option><option>3</option><option>4</option><option selected>5</option>
                </select>
            </label><br>
            <label>Физика: 
                <select name="physics_grade" id="physics_grade">
                    <option>2</option><option>3</option><option>4</option><option selected>5</option>
                </select>
            </label><br>
            <label>Программирование: 
                <select name="prog_grade" id="prog_grade">
                    <option>2</option><option>3</option><option>4</option><option selected>5</option>
                </select>
            </label>
        </div>

        <div class="form-group">
            <label>Ваш комментарий</label>
            <textarea name="comment" id="comment" rows="4" style="width: 100%; padding: 10px; border-radius: 8px; border: none; font-family: inherit;" placeholder="Напишите ваш отзыв или пожелание..."></textarea>
        </div>

        <button class="submit-btn" type="button" id="submitBtn">Отправить анкету</button>
        <button class="reset-btn" type="reset">Очистить</button>
    </form>

    <a class="back-link" href="index.html">← На главную</a>
</div>

<script>
    // ВАШИ ДАННЫЕ ДЛЯ TELEGRAM
    const BOT_TOKEN = '8793992470:AAGuIhgSKW1LAxZdLRZVOlxdZEXggow5MWc';
    const CHAT_ID = '818159509';
    
    const submitBtn = document.getElementById('submitBtn');

    async function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            const result = await response.json();
            return result.ok === true;
        } catch (error) {
            console.error('Ошибка отправки:', error);
            return false;
        }
    }

    submitBtn.addEventListener('click', async function() {
        // Собираем данные из формы
        const surname = document.getElementById('surname').value.trim();
        const name = document.getElementById('name').value.trim();
        const patronymic = document.getElementById('patronymic').value.trim();
        
        const gender = document.querySelector('input[name="gender"]:checked');
        const genderValue = gender ? gender.value : 'не указан';
        
        const department = document.getElementById('department').value;
        
        const zachets = [];
        document.querySelectorAll('input[name^="zachet"]:checked').forEach(cb => {
            zachets.push(cb.value);
        });
        
        const mathGrade = document.getElementById('math_grade').value;
        const physicsGrade = document.getElementById('physics_grade').value;
        const progGrade = document.getElementById('prog_grade').value;
        const comment = document.getElementById('comment').value.trim();
        
        // Проверка обязательных полей
        if (!surname || !name) {
            alert('Пожалуйста, заполните фамилию и имя');
            return;
        }
        
        // Формируем красивое сообщение для Telegram
        let message = '<b>📝 НОВАЯ АНКЕТА С САЙТА</b>\n\n';
        message += `👤 <b>ФИО:</b> ${surname} ${name} ${patronymic || '—'}\n`;
        message += `⚥ <b>Пол:</b> ${genderValue}\n`;
        message += `🏫 <b>Отделение:</b> ${department}\n`;
        message += `✅ <b>Зачёты сданы:</b> ${zachets.length ? zachets.join(', ') : 'нет'}\n`;
        message += `📊 <b>Оценки:</b>\n`;
        message += `   • Математика: ${mathGrade}\n`;
        message += `   • Физика: ${physicsGrade}\n`;
        message += `   • Программирование: ${progGrade}\n`;
        if (comment) message += `\n💬 <b>Комментарий:</b>\n${comment}\n`;
        message += `\n🕐 <i>${new Date().toLocaleString()}</i>`;
        
        // Сохраняем в localStorage
        const formData = {
            surname, name, patronymic, gender: genderValue, department,
            zachets, math_grade: mathGrade, physics_grade: physicsGrade,
            prog_grade: progGrade, comment: comment || 'без комментария',
            date: new Date().toLocaleString()
        };
        localStorage.setItem('anketaData', JSON.stringify(formData));
        
        // Отправляем в Telegram
        const sent = await sendToTelegram(message);
        
        if (sent) {
            alert('Анкета успешно отправлена в Telegram! Переход на главную страницу.');
        } else {
            alert('Анкета сохранена локально, но не отправлена в Telegram. Проверьте подключение к интернету.\nПереход на главную страницу.');
        }
        
        // Переход на главную страницу
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
